<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Dossiers</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
      body { font-family: 'Outfit', sans-serif; }

      .form-wrapper {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 20px;
      }

      .date-section {
        background: #fff;
        border-radius: 16px;
        padding: 20px 25px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .date-section label {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        color: #4f46e5;
        white-space: nowrap;
      }

      .date-section input[type="date"] {
        flex: 1;
        min-width: 180px;
        margin: 0;
        border: 2px solid #e0e7ff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 1rem;
        font-family: 'Outfit', sans-serif;
        transition: border-color 0.2s;
      }

      .date-section input[type="date"]:focus {
        outline: none;
        border-color: #4f46e5;
      }

      /* Grille des types */
      .types-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .type-card {
        background: #fff;
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-left: 5px solid var(--border-color, #4f46e5);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .type-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      }

      /* Couleurs par catégorie */
      .type-card.foncier    { --border-color: #4f46e5; }
      .type-card.marche     { --border-color: #f59e0b; }
      .type-card.succession { --border-color: #10b981; }
      .type-card.autre      { --border-color: #ef4444; }

      .type-label {
        font-size: 0.92rem;
        font-weight: 600;
        color: #1f2937;
        flex: 1;
        line-height: 1.3;
      }

      .type-badge {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        color: #fff;
        white-space: nowrap;
      }

      .badge-fact { background: #6366f1; }
      .badge-trait { background: #8b5cf6; }

      .type-input {
        width: 80px;
        padding: 8px 10px;
        border: 2px solid #e0e7ff;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
        color: #1f2937;
        font-family: 'Outfit', sans-serif;
        transition: border-color 0.2s;
        margin: 0;
      }

      .type-input:focus {
        outline: none;
        border-color: #4f46e5;
      }

      /* Bouton soumettre */
      .submit-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Outfit', sans-serif;
        letter-spacing: 0.5px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 6px 20px rgba(79,70,229,0.35);
      }

      .submit-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 28px rgba(79,70,229,0.45);
      }

      .submit-btn:active {
        transform: scale(0.99);
      }

      /* Résumé récap */
      #recap {
        margin-top: 16px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 0.92rem;
        color: #166534;
        display: none;
      }

      #recap.visible { display: block; }

      @media (max-width: 600px) {
        .type-card { flex-wrap: wrap; }
        .type-input { width: 70px; }
      }
    </style>
  </head>
  <body>
    <h1>Enregistrement des dossiers</h1>
    <nav>
      <a href="index.html">Enregistrement</a>
      <a href="rapports.html">Rapports</a>
      <a href="stats.html">Statistiques</a>
    </nav>

    <main style="align-items: flex-start; padding-top: 30px;">
      <div class="form-wrapper">

        <!-- Sélection de la date -->
        <div class="date-section">
          <label>📅 Date concernée</label>
          <input type="date" id="date" />
        </div>

        <!-- Grille des 8 types -->
        <div class="types-grid" id="typesGrid">

          <div class="type-card foncier">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Fonciers</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Fonciers"/>
          </div>

          <div class="type-card foncier">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Fonciers</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Fonciers"/>
          </div>

          <div class="type-card marche">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Marchés</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Marchés"/>
          </div>

          <div class="type-card marche">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Marchés</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Marchés"/>
          </div>

          <div class="type-card succession">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Successions</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Successions"/>
          </div>

          <div class="type-card succession">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Successions</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Successions"/>
          </div>

          <div class="type-card autre">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Autres Actes</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Autres Actes"/>
          </div>

          <div class="type-card autre">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Autres Actes</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Autres Actes"/>
          </div>

        </div>

        <!-- Bouton unique de soumission -->
        <button class="submit-btn" onclick="enregistrerTout()">
          ✅ Enregistrer tous les dossiers
        </button>

        <!-- Message récapitulatif -->
        <div id="recap"></div>

      </div>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
