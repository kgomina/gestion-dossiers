<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gestion des Dossiers</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dossiers" />
    <link rel="apple-touch-icon" href="icons/icon-152x152.png" />

    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>

    <style>
      body {
        font-family: 'Outfit', sans-serif;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* ═══════════════════════════════
         ÉCRAN DE VERROUILLAGE
      ═══════════════════════════════ */
      #lock-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(145deg, #312e81, #4f46e5, #7c3aed);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 30px;
      }

      #lock-screen.hidden { display: none; }

      .lock-icon {
        font-size: 3.5rem;
        margin-bottom: 10px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.08); }
      }

      .lock-title {
        color: #fff;
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 6px;
        text-align: center;
      }

      .lock-subtitle {
        color: rgba(255,255,255,0.65);
        font-size: 0.9rem;
        margin-bottom: 32px;
        text-align: center;
      }

      /* Points du code */
      .pin-dots {
        display: flex;
        gap: 16px;
        margin-bottom: 32px;
      }

      .pin-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.5);
        background: transparent;
        transition: background 0.2s, transform 0.15s;
      }

      .pin-dot.filled {
        background: #fff;
        border-color: #fff;
        transform: scale(1.15);
      }

      .pin-dot.error {
        background: #ef4444;
        border-color: #ef4444;
        animation: shake 0.4s ease;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%       { transform: translateX(-6px); }
        40%       { transform: translateX(6px); }
        60%       { transform: translateX(-4px); }
        80%       { transform: translateX(4px); }
      }

      /* Clavier numérique */
      .pin-keyboard {
        display: grid;
        grid-template-columns: repeat(3, 72px);
        grid-template-rows: repeat(4, 72px);
        gap: 14px;
      }

      .pin-key {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.25);
        background: rgba(255,255,255,0.12);
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        font-family: 'Outfit', sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, transform 0.1s;
        margin: 0;
        padding: 0;
      }

      .pin-key:hover  { background: rgba(255,255,255,0.22); }
      .pin-key:active { background: rgba(255,255,255,0.38); transform: scale(0.92); }

      .pin-key.key-empty {
        border: none;
        background: transparent;
        cursor: default;
        pointer-events: none;
      }

      .lock-error-msg {
        margin-top: 22px;
        color: #fca5a5;
        font-size: 0.88rem;
        font-weight: 600;
        min-height: 20px;
        text-align: center;
      }

      /* ═══════════════════════════════
         CONTENU PRINCIPAL
      ═══════════════════════════════ */
      .form-wrapper {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 20px;
      }

      .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 12px;
      }

      .lock-btn {
        background: rgba(79,70,229,0.12);
        color: #4f46e5;
        border: 1px solid rgba(79,70,229,0.3);
        border-radius: 20px;
        padding: 6px 16px;
        font-size: 0.85rem;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        cursor: pointer;
        width: auto;
        margin: 0;
        transition: background 0.2s;
      }
      .lock-btn:hover { background: rgba(79,70,229,0.2); }

      .date-section {
        background: #fff;
        border-radius: 16px;
        padding: 20px 25px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .date-section label {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        color: #4f46e5;
        white-space: nowrap;
      }

      .date-section input[type="date"] {
        flex: 1;
        min-width: 180px;
        margin: 0;
        border: 2px solid #e0e7ff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 16px;
        font-family: 'Outfit', sans-serif;
        transition: border-color 0.2s;
      }

      .date-section input[type="date"]:focus {
        outline: none;
        border-color: #4f46e5;
      }

      .types-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .type-card {
        background: #fff;
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-left: 5px solid var(--border-color, #4f46e5);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .type-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.15); }

      .type-card.foncier    { --border-color: #4f46e5; }
      .type-card.marche     { --border-color: #f59e0b; }
      .type-card.succession { --border-color: #10b981; }
      .type-card.autre      { --border-color: #ef4444; }

      .type-label {
        font-size: 0.92rem;
        font-weight: 600;
        color: #1f2937;
        flex: 1;
        line-height: 1.3;
      }

      .type-badge {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        color: #fff;
        white-space: nowrap;
      }

      .badge-fact  { background: #6366f1; }
      .badge-trait { background: #8b5cf6; }

      .type-input {
        width: 80px;
        padding: 10px;
        border: 2px solid #e0e7ff;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        text-align: center;
        color: #1f2937;
        font-family: 'Outfit', sans-serif;
        transition: border-color 0.2s;
        margin: 0;
      }

      .type-input:focus { outline: none; border-color: #4f46e5; }

      .submit-btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Outfit', sans-serif;
        letter-spacing: 0.5px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 6px 20px rgba(79,70,229,0.35);
        min-height: 54px;
      }

      .submit-btn:hover  { transform: scale(1.02); box-shadow: 0 10px 28px rgba(79,70,229,0.45); }
      .submit-btn:active { transform: scale(0.98); }

      #recap {
        margin-top: 16px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 0.92rem;
        color: #166534;
        display: none;
      }
      #recap.visible { display: block; }

      @media (max-width: 600px) {
        .type-card  { flex-wrap: wrap; }
        .type-input { width: 70px; }
        .types-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>

    <!-- ══════════ ÉCRAN DE VERROUILLAGE ══════════ -->
    <div id="lock-screen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">Accès restreint</div>
      <div class="lock-subtitle">Saisissez votre code pour continuer</div>

      <div class="pin-dots">
        <div class="pin-dot" id="dot0"></div>
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
      </div>

      <div class="pin-keyboard">
        <button class="pin-key" onclick="pressKey('1')">1</button>
        <button class="pin-key" onclick="pressKey('2')">2</button>
        <button class="pin-key" onclick="pressKey('3')">3</button>
        <button class="pin-key" onclick="pressKey('4')">4</button>
        <button class="pin-key" onclick="pressKey('5')">5</button>
        <button class="pin-key" onclick="pressKey('6')">6</button>
        <button class="pin-key" onclick="pressKey('7')">7</button>
        <button class="pin-key" onclick="pressKey('8')">8</button>
        <button class="pin-key" onclick="pressKey('9')">9</button>
        <button class="pin-key key-empty" disabled></button>
        <button class="pin-key" onclick="pressKey('0')">0</button>
        <button class="pin-key" onclick="deleteKey()">⌫</button>
      </div>

      <div class="lock-error-msg" id="lockError"></div>
    </div>

    <!-- ══════════ CONTENU PRINCIPAL ══════════ -->
    <h1>Enregistrement des dossiers</h1>
    <nav>
      <a href="index.html">Enregistrement</a>
      <a href="rapports.html">Rapports</a>
      <a href="stats.html">Statistiques</a>
    </nav>

    <main style="align-items: flex-start; padding-top: 20px;">
      <div class="form-wrapper">

        <!-- Bouton verrouiller -->
        <div class="top-bar">
          <button class="lock-btn" onclick="verrouiller()">🔒 Verrouiller</button>
        </div>

        <div class="date-section">
          <label>📅 Date concernée</label>
          <input type="date" id="date" />
        </div>

        <div class="types-grid">

          <div class="type-card foncier">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Fonciers</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Fonciers"/>
          </div>

          <div class="type-card foncier">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Fonciers</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Fonciers"/>
          </div>

          <div class="type-card marche">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Marchés</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Marchés"/>
          </div>

          <div class="type-card marche">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Marchés</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Marchés"/>
          </div>

          <div class="type-card succession">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Successions</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Successions"/>
          </div>

          <div class="type-card succession">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Successions</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Successions"/>
          </div>

          <div class="type-card autre">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Autres Actes</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Autres Actes"/>
          </div>

          <div class="type-card autre">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Autres Actes</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Autres Actes"/>
          </div>

        </div>

        <button class="submit-btn" onclick="enregistrerTout()">
          ✅ Enregistrer tous les dossiers
        </button>

        <div id="recap"></div>
      </div>
    </main>

    <!-- ══════════ SCRIPTS ══════════ -->
    <script>
      const CODE_SECRET = "270";
      let saisie = "";

      function pressKey(chiffre) {
        if (saisie.length >= CODE_SECRET.length) return;
        saisie += chiffre;
        updateDots();
        if (saisie.length === CODE_SECRET.length) {
          setTimeout(validerCode, 180);
        }
      }

      function deleteKey() {
        saisie = saisie.slice(0, -1);
        updateDots();
        document.getElementById("lockError").textContent = "";
      }

      function updateDots() {
        for (let i = 0; i < CODE_SECRET.length; i++) {
          const dot = document.getElementById("dot" + i);
          dot.classList.toggle("filled", i < saisie.length);
          dot.classList.remove("error");
        }
      }

      function validerCode() {
        if (saisie === CODE_SECRET) {
          document.getElementById("lock-screen").classList.add("hidden");
          sessionStorage.setItem("auth", "ok");
        } else {
          for (let i = 0; i < CODE_SECRET.length; i++) {
            const dot = document.getElementById("dot" + i);
            dot.classList.remove("filled");
            dot.classList.add("error");
          }
          document.getElementById("lockError").textContent = "❌ Code incorrect. Réessayez.";
          setTimeout(() => {
            saisie = "";
            updateDots();
          }, 900);
        }
      }

      function verrouiller() {
        sessionStorage.removeItem("auth");
        saisie = "";
        updateDots();
        document.getElementById("lockError").textContent = "";
        document.getElementById("lock-screen").classList.remove("hidden");
      }

      // Support clavier physique (PC)
      document.addEventListener("keydown", (e) => {
        if (document.getElementById("lock-screen").classList.contains("hidden")) return;
        if (e.key >= "0" && e.key <= "9") pressKey(e.key);
        if (e.key === "Backspace") deleteKey();
        if (e.key === "Enter" && saisie.length === CODE_SECRET.length) validerCode();
      });

      // Déjà authentifié dans cette session ?
      if (sessionStorage.getItem("auth") === "ok") {
        document.getElementById("lock-screen").classList.add("hidden");
      }
    </script>

    <script type="module" src="js/app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/gestion-dossiers/service-worker.js")
            .then((reg) => console.log("[SW] Enregistré :", reg.scope))
            .catch((err) => console.error("[SW] Erreur :", err));
        });
      }
    </script>
  </body>
</html>
