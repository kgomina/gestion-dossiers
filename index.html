<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gestion des Dossiers</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Theme color (Android) -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dossiers" />
    <link rel="apple-touch-icon" href="icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96"   href="icons/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png" />

    <!-- Windows / Edge -->
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#4f46e5" />

    <!-- SEO / Description -->
    <meta name="description" content="Application de gestion quotidienne des dossiers" />

    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>

    <style>
      body { font-family: 'Outfit', sans-serif; }

      /* Safe area pour iPhone avec encoche */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      .form-wrapper {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 20px;
      }

      .date-section {
        background: #fff;
        border-radius: 16px;
        padding: 20px 25px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .date-section label {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        color: #4f46e5;
        white-space: nowrap;
      }

      .date-section input[type="date"] {
        flex: 1;
        min-width: 180px;
        margin: 0;
        border: 2px solid #e0e7ff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 1rem;
        font-family: 'Outfit', sans-serif;
        transition: border-color 0.2s;
      }

      .date-section input[type="date"]:focus {
        outline: none;
        border-color: #4f46e5;
      }

      .types-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .type-card {
        background: #fff;
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-left: 5px solid var(--border-color, #4f46e5);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .type-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      }

      .type-card.foncier    { --border-color: #4f46e5; }
      .type-card.marche     { --border-color: #f59e0b; }
      .type-card.succession { --border-color: #10b981; }
      .type-card.autre      { --border-color: #ef4444; }

      .type-label {
        font-size: 0.92rem;
        font-weight: 600;
        color: #1f2937;
        flex: 1;
        line-height: 1.3;
      }

      .type-badge {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        color: #fff;
        white-space: nowrap;
      }

      .badge-fact  { background: #6366f1; }
      .badge-trait { background: #8b5cf6; }

      .type-input {
        width: 80px;
        padding: 10px;
        border: 2px solid #e0e7ff;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
        color: #1f2937;
        font-family: 'Outfit', sans-serif;
        transition: border-color 0.2s;
        margin: 0;
        /* Évite le zoom iOS sur focus */
        font-size: 16px;
      }

      .type-input:focus {
        outline: none;
        border-color: #4f46e5;
      }

      .submit-btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Outfit', sans-serif;
        letter-spacing: 0.5px;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 6px 20px rgba(79,70,229,0.35);
        /* Taille tactile minimum recommandée */
        min-height: 54px;
      }

      .submit-btn:hover  { transform: scale(1.02); box-shadow: 0 10px 28px rgba(79,70,229,0.45); }
      .submit-btn:active { transform: scale(0.98); }

      #recap {
        margin-top: 16px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 0.92rem;
        color: #166534;
        display: none;
      }
      #recap.visible { display: block; }

      /* Bannière d'installation */
      #install-banner {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2937;
        color: #fff;
        padding: 14px 22px;
        border-radius: 14px;
        font-size: 0.95rem;
        font-weight: 600;
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        z-index: 999;
        gap: 14px;
        align-items: center;
        max-width: 90%;
        font-family: 'Outfit', sans-serif;
      }
      #install-banner.visible { display: flex; }
      #install-banner button {
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Outfit', sans-serif;
        width: auto;
        margin: 0;
      }
      #install-banner .dismiss {
        background: transparent;
        color: #9ca3af;
        font-size: 0.85rem;
        padding: 4px 8px;
      }

      @media (max-width: 600px) {
        .type-card { flex-wrap: wrap; }
        .type-input { width: 70px; }
        .types-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <h1>Enregistrement des dossiers</h1>
    <nav>
      <a href="index.html">Enregistrement</a>
      <a href="rapports.html">Rapports</a>
      <a href="stats.html">Statistiques</a>
    </nav>

    <main style="align-items: flex-start; padding-top: 30px;">
      <div class="form-wrapper">

        <div class="date-section">
          <label>📅 Date concernée</label>
          <input type="date" id="date" />
        </div>

        <div class="types-grid" id="typesGrid">

          <div class="type-card foncier">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Fonciers</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Fonciers"/>
          </div>

          <div class="type-card foncier">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Fonciers</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Fonciers"/>
          </div>

          <div class="type-card marche">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Marchés</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Marchés"/>
          </div>

          <div class="type-card marche">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Marchés</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Marchés"/>
          </div>

          <div class="type-card succession">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Successions</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Successions"/>
          </div>

          <div class="type-card succession">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Successions</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Successions"/>
          </div>

          <div class="type-card autre">
            <span class="type-badge badge-fact">Facturation</span>
            <span class="type-label">Autres Actes</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Facturation Autres Actes"/>
          </div>

          <div class="type-card autre">
            <span class="type-badge badge-trait">Traitement</span>
            <span class="type-label">Autres Actes</span>
            <input class="type-input" type="number" min="0" value="0" data-type="Traitement Autres Actes"/>
          </div>

        </div>

        <button class="submit-btn" onclick="enregistrerTout()">
          ✅ Enregistrer tous les dossiers
        </button>

        <div id="recap"></div>
      </div>
    </main>

    <!-- Bannière d'installation -->
    <div id="install-banner">
      <span>📲 Installer l'application sur votre téléphone ?</span>
      <button id="install-btn">Installer</button>
      <button class="dismiss" id="dismiss-btn">Non merci</button>
    </div>

    <script type="module" src="js/app.js"></script>

    <script>
      // Enregistrement du Service Worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/gestion-dossiers/service-worker.js")
            .then((reg) => console.log("[SW] Enregistré :", reg.scope))
            .catch((err) => console.error("[SW] Erreur :", err));
        });
      }

      // Bannière d'installation (Android Chrome)
      let deferredPrompt;
      const banner = document.getElementById("install-banner");
      const installBtn = document.getElementById("install-btn");
      const dismissBtn = document.getElementById("dismiss-btn");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        banner.classList.add("visible");
      });

      installBtn.addEventListener("click", async () => {
        banner.classList.remove("visible");
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log("Installation :", outcome);
          deferredPrompt = null;
        }
      });

      dismissBtn.addEventListener("click", () => {
        banner.classList.remove("visible");
      });

      window.addEventListener("appinstalled", () => {
        console.log("✅ Application installée !");
        banner.classList.remove("visible");
      });
    </script>
  </body>
</html>
